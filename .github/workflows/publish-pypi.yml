name: Publish to PyPI

on:
  release:
    types:
      - published

jobs:
  publish-prod:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the version bump commit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Derive version from release tag
        id: current_version
        run: |
          # Tag is e.g. "v0.2.2" or "0.2.2" — strip leading 'v'
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION (from tag: $TAG)"

      - name: Sync VERSION + pyproject.toml + setup.py from tag
        run: |
          VERSION="${{ steps.current_version.outputs.version }}"
          echo "$VERSION" > VERSION
          sed -i "s/^version = .*/version = \"$VERSION\"  # kept in sync by CI — source of truth is VERSION file/" pyproject.toml
          sed -i "s/^    version=.*/    version=\"$VERSION\",/" setup.py

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload --skip-existing dist/*

      - name: Bump patch version for next release
        id: bump
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="$MAJOR.$MINOR.$NEXT_PATCH"
          echo "$NEXT_VERSION" > VERSION
          sed -i "s/^version = .*/version = \"$NEXT_VERSION\"  # kept in sync by CI — source of truth is VERSION file/" pyproject.toml
          sed -i "s/^version = .*/version = \"$NEXT_VERSION\"/" setup.py 2>/dev/null || true
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION pyproject.toml setup.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.next_version }} after release [skip ci]"
          git push origin HEAD:main
